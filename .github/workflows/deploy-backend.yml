name: Deploy Backend
on:
  workflow_dispatch:
  push:
    branches: [main, master, staging, 'feature/**']
    paths: ['backend/**', 'render.yaml']
  pull_request:
    branches: [main, master]
    paths: ['backend/**', 'render.yaml']

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linting & Verification Tools
        run: pip install py_compile requests pydantic pydantic-settings fastapi

      - name: Syntax Check & Verification
        run: python -m py_compile backend/app/services/local_ai.py backend/app/core/config.py backend/app/core/supabase.py

      - name: Deploy to Render
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ vars.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
