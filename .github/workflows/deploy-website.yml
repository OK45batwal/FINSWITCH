name: Deploy Website to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main, master, staging, 'feature/**']
    paths: ['website/**']
  pull_request:
    branches: [main, master]
    paths: ['website/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Run Lint & Quality Check
        run: npm run lint --if-present
        working-directory: website

      - name: Build site
        run: npm run build
        working-directory: website
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Determine Deploy Branch Target
        id: branch_target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "TARGET_BRANCH=master" >> $GITHUB_ENV
          else
            echo "TARGET_BRANCH=preview-${{ github.event.number || github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name finswitch --branch ${{ env.TARGET_BRANCH }} --commit-dirty=true
        working-directory: website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
