<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinSwitch Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0A1628; --card: #0F2239; --border: rgba(255,255,255,0.06);
      --text: #FFFFFF; --muted: #6B7280; --blue: #2563EB; --green: #10B981; --red: #EF4444;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar h2 { font-size: 18px; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
    .sidebar h2 img { width: 28px; height: 28px; border-radius: 6px; }
    .sidebar a { padding: 10px 14px; border-radius: 8px; color: var(--muted); text-decoration: none; font-size: 14px; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
    .sidebar a:hover, .sidebar a.active { background: rgba(37,99,235,0.1); color: var(--blue); }
    .main { flex: 1; padding: 32px; overflow-y: auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .header h1 { font-size: 24px; font-weight: 700; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
    .stat-card .label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .change { font-size: 13px; color: var(--green); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2><svg width="28" height="28" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" style="border-radius:6px;flex-shrink:0;"><rect width="512" height="512" rx="96" fill="url(#alogo)"/><path d="M160 352L256 192l96 160" stroke="url(#alogo1)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M208 288l48-64 48 64" stroke="url(#alogo2)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/><defs><linearGradient id="alogo" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A1628"/><stop offset="100%" stop-color="#0F2239"/></linearGradient><linearGradient id="alogo1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#1D4ED8"/></linearGradient><linearGradient id="alogo2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#059669"/></linearGradient></defs></svg>FinSwitch</h2>
    <a href="#" class="active">📊 Dashboard</a>
    <a href="#">👥 Users</a>
    <a href="#">📈 Stocks</a>
    <a href="#">🏢 Companies</a>
    <a href="#">📰 News</a>
    <a href="#">📚 Articles</a>
    <a href="#">🔔 Notifications</a>
    <a href="#">📋 Reports</a>
    <a href="#">⚙️ Settings</a>
  </div>
  <div class="main">
    <div class="header">
      <h1>Dashboard</h1>
      <div style="color:var(--muted);font-size:14px;">Last updated: Just now</div>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="label">Total Users</div><div class="value">52,340</div><div class="change">+12.5% this month</div></div>
      <div class="stat-card"><div class="label">Active Today</div><div class="value">8,421</div><div class="change">+5.2%</div></div>
      <div class="stat-card"><div class="label">Stocks Tracked</div><div class="value">1,847</div><div class="change">+3.1%</div></div>
      <div class="stat-card"><div class="label">AI Queries</div><div class="value">142,380</div><div class="change">+28.7%</div></div>
    </div>
  </div>
</body>
</html>
